# Nginx config for mapsapi.mostdata.site (Backend API + Auth Service)
# Auth service: port 3002, Main API: port 3001
#
# SSL: sudo certbot certonly --webroot -w /var/www/html -d mapsapi.mostdata.site
# Then add listen 443 ssl; ssl_certificate /etc/letsencrypt/live/mapsapi.mostdata.site/...

server {
    listen 80;
    listen [::]:80;
    server_name mapsapi.mostdata.site;

    # Let's Encrypt ACME challenge (Certbot)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/html;
        allow all;
    }

    # Auth service (register, login, users/me)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main API + WebSocket
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for /api/ws/:room_id)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
