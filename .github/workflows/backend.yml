# Backend repo - Build + Deploy ไป VPS Ubuntu
# Secrets: ดู .github/SECRETS.md
name: Backend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://maps:maps@localhost:5432/maps' }}
  REDIS_URL: ${{ secrets.REDIS_URL || 'redis://localhost:6379' }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-32-chars-minimum' }}
  PORT: ${{ secrets.PORT || '3001' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test -- --nocapture

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: maps-backend
          path: target/release/maps-backend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: maps-backend

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create .env for deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgres://maps:maps@localhost:5432/maps' }}
          REDIS_URL: ${{ secrets.REDIS_URL || 'redis://localhost:6379' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'change-me-in-production-32-chars' }}
          PORT: ${{ secrets.PORT || '3001' }}
        run: |
          {
            echo "DATABASE_URL=$DATABASE_URL"
            echo "REDIS_URL=$REDIS_URL"
            echo "JWT_SECRET=$JWT_SECRET"
            echo "PORT=$PORT"
          } > .env.deploy

      - name: Deploy to VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/maps-backend' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sudo mkdir -p $DEPLOY_PATH && sudo chown $USER:$USER $DEPLOY_PATH"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            .env.deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$DEPLOY_PATH/.env
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            maps-backend ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$DEPLOY_PATH/maps-backend
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy/maps-backend.service ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/maps-backend.service
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "chmod +x $DEPLOY_PATH/maps-backend && \
             sudo mv /tmp/maps-backend.service /etc/systemd/system/maps-backend.service && \
             sudo systemctl daemon-reload && \
             sudo systemctl enable maps-backend && \
             sudo systemctl restart maps-backend"
